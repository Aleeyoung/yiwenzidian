<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贡献者 - 彝文字典</title>
    <link rel="shortcut icon" href="src/favicon.ico" type="image/x-icon">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '宋体';
        }
        
        #container{
            width: 100vw;
            display: flex;
            justify-content: center;
        }
        #content{
            width: 60%;
        }
        #contributor_title{
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 3em 0;
        }
        #contributor_title p{
            font-size: 3em;
            font-weight: bold;
        }
        #contributor_title span{
            color: #666;
        }
        .contributors_list{
            padding: 2em;
        }
        .item{
            display: flex;
            flex-direction: row;
            margin: 2em 0;
        }
        .contributor_info{
            color: 666;
            min-width: 13em;
            margin: 0.4em 0;
        }
        .contributor_info span{
            color: #000;
            font-weight: bold;
        }
        .contributor_icon{
            height: 5em;
            display: block;
            margin: 0 1em;
            cursor: pointer;
        }
        .contribute_info{
            position: relative;
        }
        .accepted{
            min-width: 4em;
            color: #59a700;
            border: 1px solid #58cc00;
            position: absolute;
            right: 0;
            bottom: 0;
            text-align: center;
        }
        .contributor_member{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        #opener{
            position: fixed;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            border: none;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            background-color: #ddd;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #dialog_title{
            font-size: 3em;
        }
        #dialog_block{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1em;
        }

        #dialog_close_btn{
            width: fit-content;
            padding: 1em 5em;
            outline: none;
            border: none;
            transition: 0.3s;
            cursor: pointer;
        }

        #dialog_close_btn:hover{
            color: #fff;
            background-color: #000;
        }

        .dialogger {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: auto;
            border: none;
            border-radius: 12px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .dialog_title {
            font-size: 2em;
            margin: 1em;
            line-height: 1.4;
        }
        .qr_code {
            text-align: center;
        }
        .qr_code img {
            max-width: 100%;
            height: auto;
            max-height: 50vh;
        }
        .close_btn {
            display: flex;
            justify-content: center;
            margin: 2em 0;
        }
        .close_button {
            display: block;
            height: 3em;
            width: 20vh;
            max-width: 180px;
            min-width: 100px;
            text-align: center;
            line-height: 3em;
            color: #fff;
            background-color: #0f62f1;
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 6px;
        }

        @media screen and (max-width: 768px) {
            #content {
                width: 90%;
            }
            .contributor_member{
                display: flex;
                flex-direction: column;
            }
        }

        @media screen and (max-width: 400px) {
            #content {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="content">
            <div id="contributor_title">
                <p>贡献者名单</p>
                <span>排序依据：时间</span>
                <span>更新周期：7天，本次更新：2026年6月13日</span>
            </div>
            <div id="contributor_types">
                <div class="contributor_item">
                    <div class="contributor_type_head">
                        <p style="font-size: 2em;font-weight: bold;">设计专家</p>
                    </div>
                    <div class="contributors_list">
                        <div class="contributor_member">
                            <div class="item">
                                <img src="src/contributor_0001.jpg" alt="莓有烦恼[调皮]" title="莓有烦恼[调皮]" class="contributor_icon">
                                <div class="contribute_info">
                                    <p class="contributor_info"><span>莓有烦恼[调皮]</span>/贡献者名字</p>
                                    <p class="contributor_info"><span>软件内复制功能</span>/贡献内容</p>
                                    <div class="accepted">
                                        已接受！
                                    </div>
                                </div>
                            </div>
                            <div class="item">
                                <img src="src/contributor_plus.png" alt="成为贡献者" title="成为贡献者" class="contributor_icon" onclick="document.getElementById('qq_group_dialog').showModal()">
                                <div class="contribute_info">
                                    <p class="contributor_info"><span></span>/贡献者名字</p>
                                    <p class="contributor_info"><span></span>/贡献内容</p>
                                    <div class="accepted">
                                        ---
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="contributor_item">
                    <div class="contributor_type_head">
                        <p style="font-size: 2em;font-weight: bold;">语言专家</p>
                    </div>
                    <div class="contributors_list">
                        <div class="contributor_member">
                            <div class="item">
                                <img src="src/contributor_plus.png" alt="成为贡献者" title="成为贡献者" class="contributor_icon" onclick="document.getElementById('qq_group_dialog').showModal()">
                                <div class="contribute_info">
                                    <p class="contributor_info"><span></span>/贡献者名字</p>
                                    <p class="contributor_info"><span></span>/贡献内容</p>
                                    <div class="accepted">
                                        ---
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                    </div>
                </div>

                <div class="contributor_item">
                    <div class="contributor_type_head">
                        <p style="font-size: 2em;font-weight: bold;">慷慨的投资者</p>
                    </div>
                    <div class="contributors_list">
                        <div class="contributor_member">
                            <div class="item">
                                <img src="src/contributor_plus.png" alt="成为贡献者" title="成为贡献者" class="contributor_icon" onclick="document.getElementById('qq_group_dialog').showModal()">
                                <div class="contribute_info">
                                    <p class="contributor_info"><span></span>/贡献者名字</p>
                                    <p class="contributor_info"><span></span>/贡献内容</p>
                                    <div class="accepted">
                                        ---
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                    </div>
                </div>

                <div class="contributor_item">
                    <div class="contributor_type_head">
                        <p style="font-size: 2em;font-weight: bold;">其他类型的贡献</p>
                    </div>
                    <div class="contributors_list">
                        <div class="contributor_member">
                            <div class="item">
                                <img src="src/contributor_plus.png" alt="成为贡献者" title="成为贡献者" class="contributor_icon" onclick="document.getElementById('qq_group_dialog').showModal()">
                                <div class="contribute_info">
                                    <p class="contributor_info"><span></span>/贡献者名字</p>
                                    <p class="contributor_info"><span></span>/贡献内容</p>
                                    <div class="accepted">
                                        ---
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                    </div>
                </div>


            </div>
        </div>
    </div>

    <div id="opener">
        <div id="dialog_block">
            <p id="dialog_title">有你们的支持使得项目越来越好！</p>
            <p id="dialog_description">来看看有哪些贡献者为彝文字典提供了哪些建议和支持</p>
            <button id="dialog_close_btn" onclick="document.getElementById('opener').style.display='none';">关闭</button>
        </div>
    </div>

    <dialog id="qq_group_dialog" class="dialogger">
        <p class="dialog_title">如果你能直接联系阿力，就不用扫这个码</p>
        <div class="qr_code">
            <img src="src/qq_qr_code.jpg" alt="彝文字典交流QQ群：右键或长按保存">
        </div>
        <div class="close_btn">
            <button onclick="document.getElementById('qq_group_dialog').close()" class="close_button">关闭</button>
        </div>
    </dialog>

</body>
</html>
